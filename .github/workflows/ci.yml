name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install forge dependencies
        working-directory: packages/contracts
        run: forge install foundry-rs/forge-std@v1.15.0 OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-commit

      - name: Run tests
        working-directory: packages/contracts
        run: forge test -vvv

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/web
        run: pnpm typecheck

      - name: Test
        working-directory: packages/web
        run: pnpm test
